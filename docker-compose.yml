services:
  tomcat:
    image: tomcat:latest
    container_name: app-server
    ports:
      - "8080:8080"
    volumes:
      - ./tomcat/webapps:/usr/local/tomcat/webapps
    restart: unless-stopped
  monitor:
    image: monitor:latest
    container_name: monitor
    build:
      context: ./monitor
      dockerfile: dockerfile
    volumes:
      - ./logs:/logs
    depends_on:
      - tomcat
    restart: unless-stopped
