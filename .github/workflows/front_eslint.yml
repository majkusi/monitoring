name: front_eslint

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/front_eslint.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/front_eslint.yml"

jobs:
  front_eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
