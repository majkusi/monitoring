name: front_eslint

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/front_eslint.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/front_eslint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  front_eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/monitoring-frontend/package-lock.json
      - run: npm ci
        working-directory: frontend/monitoring-frontend
      - run: npm run lint
        working-directory: frontend/monitoring-frontend
      - run: npm run build
        working-directory: frontend/monitoring-frontend
