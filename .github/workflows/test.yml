name: tests

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r api/requirements.txt
      - run: pytest
        working-directory: api
